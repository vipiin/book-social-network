type: service
name: book-social-network

services:
  - name: backend
    git:
      repository: https://github.com/vipiin/book-social-network
      branch: main
    build:
      dockerfile: Dockerfile.backend
    env:
      SPRING_PROFILES_ACTIVE: prod
      JDBC_DATABASE_URL: koyeb-secret:JDBC_DATABASE_URL
      DB_USERNAME: koyeb-secret:DB_USERNAME
      DB_PASSWORD: koyeb-secret:DB_PASSWORD
      SPRING_MAIL_HOST: smtp-relay.brevo.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: koyeb-secret:BREVO_USER
      SPRING_MAIL_PASSWORD: koyeb-secret:BREVO_PASSWORD
      JWT_SECRET: koyeb-secret:JWT_SECRET
      CLOUDINARY_CLOUD_NAME: koyeb-secret:CLOUDINARY_CLOUD_NAME
      CLOUDINARY_API_KEY: koyeb-secret:CLOUDINARY_API_KEY
      CLOUDINARY_API_SECRET: koyeb-secret:CLOUDINARY_API_SECRET
      FRONTEND_URL: https://frontend-app.koyeb.app
    ports:
      - port: 8088
        path: /api/v1/health
    routes:
      - path: /api
        port: 8088

  - name: frontend
    git:
      repository: https://github.com/vipiin/book-social-network
      branch: main
    build:
      dockerfile: Dockerfile.frontend
    ports:
      - port: 80
        path: /
    routes:
      - path: /
        port: 80
