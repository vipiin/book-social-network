<h2>My Returned Books</h2>
<hr>
<div *ngIf="message()" class="alert" [class.alert-danger]="level() === 'error'"
    [class.alert-success]="level() === 'success'">
    {{message()}}</div>
<div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Title</th>
                    <th scope="col">Author</th>
                    <th scope="col">ISBN</th>
                    <th scope="col">Rate</th>
                    <th scope="col"><i class="fas fa-cogs"></i></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let book of returnedBooks().content; let index = index">
                    <th scope="row">{{index + 1}}</th>
                    <td>{{book.title}}</td>
                    <td>{{book.authorName}}</td>
                    <td>{{book.isbn}}</td>
                    <td><i class="fas fa-star text-warning me-1"></i>{{book.rate}}</td>
                    <td>
                        <div class="d-flex gap-2">
                            <i *ngIf="book.returned" class="fa-regular fa-paper-plane text-primary cursor-pointer"></i>
                            <i *ngIf="!book.returned" class="fa-solid fa-paper-plane text-success cursor-pointer"></i>
                            <i class="fa-solid fa-circle-check cursor-pointer" (click)="approveBookReturn(book)"
                                [class.text-success]="book.returnApproved"></i>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="d-flex justify-content-center mt-3">
        <nav aria-label="Page navigation example"
            *ngIf="returnedBooks().content && returnedBooks().content!.length > 0">
            <ul class="pagination">
                <li class="page-item">
                    <a href="javascript:void(0)" aria-label="First" class="page-link" (click)="goToFirstPage()"
                        [class.disabled]="page == 0">
                        <i class="fa-solid fa-angles-left"></i>
                    </a>
                </li>
                <li class="page-item">
                    <a href="javascript:void(0)" aria-label="Previous" class="page-link" (click)="goToPreviousPage()"
                        [class.disabled]="page == 0">
                        <i class="fa-solid fa-angle-left"></i>
                    </a>
                </li>
                <li class="page-item"
                    *ngFor="let _ of [].constructor(this.returnedBooks().totalPages); let pageIndex = index">
                    <a href="javascript:void(0)" aria-label="Page" class="page-link" (click)="goToPage(pageIndex)"
                        [class.active]="page == pageIndex">
                        {{pageIndex + 1}}
                    </a>
                </li>
                <li class="page-item">
                    <a href="javascript:void(0)" aria-label="Next" class="page-link" (click)="goToNextPage()"
                        [class.disabled]="isLastPage">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </li>
                <li class="page-item">
                    <a href="javascript:void(0)" aria-label="Last Page" class="page-link" (click)="goToLastPage()"
                        [class.disabled]="isLastPage">
                        <i class="fa-solid fa-angles-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
        <p *ngIf="returnedBooks().content && returnedBooks().content!.length === 0">No books to display</p>
    </div>
</div>
