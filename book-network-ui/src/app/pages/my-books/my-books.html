<h3> My Books list</h3>
<hr>
<div class="d-flex justify-content-end mb-3">
    <a href="" routerLink="/books/manage" class="btn btn-outline-primary">

        <i class="fas fa-plus"></i>&nbsp;New book</a>
</div>
<div class="d-flex justify-content-start gap-2 flex-wrap">
    <app-book-card [_book]="book" *ngFor="let 
    book of bookResponse().content" [manage]="true" (archive)="archiveBook($event)" (share)="shareBook($event)"
        (edit)="editBook($event)"></app-book-card>
</div>
<div class="d-flex justify-content-center mt-3">
    <nav aria-label="Page navigation example" *ngIf="bookResponse().content && bookResponse().content!.length > 0">
        <ul class="pagination">
            <li class="page-item">
                <a href="javascript:void(0)" aria-label="First" class="page-link" (click)="goToFirstPage()"
                    [class.disabled]="page == 0">
                    <i class="fa-solid fa-angles-left"></i>
                </a>
            </li>
            <li class="page-item">
                <a href="javascript:void(0)" aria-label="Previous" class="page-link" (click)="goToPreviousPage()"
                    [class.disabled]="page == 0">
                    <i class="fa-solid fa-angle-left"></i>
                </a>
            </li>
            <li class="page-item" *ngFor="let _ of [].constructor(this.bookResponse().totalPages); let pageIndex=index">
                <a href="javascript:void(0)" aria-label="Page" class="page-link" (click)="goToPage(pageIndex)"
                    [class.active]="page == pageIndex">
                    {{pageIndex+1}}
                </a>
            </li>
            <li class="page-item">
                <a href="javascript:void(0)" aria-label="Next" class="page-link" (click)="goToNextPage()"
                    [class.disabled]="isLastPage">
                    <i class="fa-solid fa-chevron-right"></i>
                </a>
            </li>
            <li class="page-item">
                <a href="javascript:void(0)" aria-label="Last Page" class="page-link" (click)="goToLastPage()"
                    [class.disabled]="isLastPage">
                    <i class="fa-solid fa-angles-right"></i>
                </a>
            </li>
        </ul>
    </nav>
    <p *ngIf="bookResponse().content && bookResponse().content!.length === 0">No books to display</p>
</div>
